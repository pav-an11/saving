<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <link rel="stylesheet" href="pas.css">
</head>
<body>

    <form class="form-container" method="post" data-page="reset">


        <h2>Forgot Password</h2>

        <p class="info">
            Enter your registered email address to receive a password reset link.
        </p>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="new_password" style="margin-top: 18px;">New Password</label>
        <input type="password" id="new_password" name="new_password" placeholder="Enter new password" required>

        <label for="confirm_new_password">Confirm New Password</label>
        <input type="password" id="confirm_new_password" name="confirm_new_password" placeholder="Confirm new password" required>

        <button type="submit">Reset Password</button>

        <div id="authMessage" style="margin-top: 12px; display:none;"></div>

        <p class="back">
            <a href="login.html">← Back to Login</a>
        </p>

    </form>

    <script src="auth.js"></script>
</body>
</html>
